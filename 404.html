<!DOCTYPE html>
<html lang="en">
<head>
<script>
  (function(){var s=localStorage.getItem('ms-theme'),d=window.matchMedia('(prefers-color-scheme: dark)').matches;document.documentElement.setAttribute('data-theme',s||(d?'dark':'light'));})();
</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found · Meet Shah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F5F0E8; --ink: #1A1612; --warm-mid: #6B5F52;
      --accent: #C4552A; --accent-light: #E8A98A;
      --soft-line: rgba(26,22,18,0.1);
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    [data-theme="dark"] { --cream: #141210; --ink: #F0EBE3; --warm-mid: #A89880; --soft-line: rgba(240,235,227,0.1); }
    [data-theme="dark"] body { background: #141210; color: #F0EBE3; }
    [data-theme="dark"] nav { background: #1C1916; }
    [data-theme="dark"] .nav-logo { color: var(--accent); }

    html { scroll-behavior: smooth; }
    body {
      background: var(--cream); color: var(--ink);
      font-family: var(--font-body); font-weight: 300;
      line-height: 1.6; overflow-x: hidden;
      min-height: 100vh; display: flex; flex-direction: column;
      transition: background 0.3s, color 0.3s;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.25rem 4rem; background: #FFFFF8;
      box-shadow: 0 1px 0 rgba(26,22,18,0.08), 0 2px 16px rgba(26,22,18,0.06);
      transition: background 0.3s;
    }
    .nav-logo {
      font-family: var(--font-display); font-size: 1.25rem;
      font-weight: 600; color: var(--accent); text-decoration: none;
    }
    .nav-back {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--warm-mid); text-decoration: none; transition: color .2s;
    }
    .nav-back:hover { color: var(--accent); }
    .nav-back:hover svg { transform: translateX(-3px); }
    .nav-back svg { transition: transform .2s; }

    .container {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8rem 4rem 5rem; text-align: center;
    }

    .error-number {
      font-family: var(--font-display);
      font-size: clamp(8rem, 20vw, 16rem);
      font-weight: 300; line-height: 1;
      color: var(--ink); opacity: 0.08;
      letter-spacing: -0.04em;
      position: absolute;
      user-select: none;
    }

    .error-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 1.5rem;
    }

    .error-tag {
      font-size: 0.72rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--accent);
      font-weight: 500;
      opacity: 0; animation: fadeUp 0.8s 0.2s forwards;
    }

    .error-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 300; line-height: 1.05; color: var(--ink);
      opacity: 0; animation: fadeUp 0.9s 0.35s forwards;
    }

    .error-title em { font-style: italic; color: var(--accent); }

    .error-desc {
      font-size: 0.95rem; color: var(--warm-mid);
      max-width: 420px; line-height: 1.75;
      opacity: 0; animation: fadeUp 0.9s 0.5s forwards;
    }

    .error-actions {
      display: flex; gap: 1rem; flex-wrap: wrap;
      justify-content: center; margin-top: 1rem;
      opacity: 0; animation: fadeUp 0.9s 0.65s forwards;
    }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: var(--ink); color: var(--cream);
      padding: 0.85rem 2rem; font-family: var(--font-body);
      font-size: 0.78rem; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; text-decoration: none;
      transition: background 0.25s, transform 0.2s;
    }
    .btn-primary:hover { background: var(--accent); transform: translateY(-2px); }
    [data-theme="dark"] .btn-primary { background: #F0EBE3; color: #141210; }
    [data-theme="dark"] .btn-primary:hover { background: var(--accent); color: white; }

    .btn-secondary {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--ink); padding: 0.85rem 2rem;
      font-family: var(--font-body); font-size: 0.78rem;
      font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      text-decoration: none; border: 1.5px solid var(--soft-line);
      transition: border-color 0.25s, color 0.25s, transform 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    [data-theme="dark"] .btn-secondary { color: #F0EBE3; border-color: rgba(240,235,227,0.2); }

    footer {
      padding: 2rem 4rem; display: flex;
      justify-content: space-between; align-items: center;
      background: var(--ink); border-top: 1px solid rgba(245,240,232,0.08);
      transition: background 0.3s;
    }
    [data-theme="dark"] footer { background: #1C1916; }
    .footer-copy { font-size: 0.72rem; letter-spacing: 0.1em; color: rgba(245,240,232,0.3); }
    [data-theme="dark"] .footer-copy { color: rgba(240,235,227,0.5); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      nav { padding: 1.25rem 1.5rem; }
      .container { padding: 7rem 1.5rem 4rem; }
      footer { flex-direction: column; gap: 0.5rem; padding: 1.5rem; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Meet Shah</a>
    <a href="index.html" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Back Home
    </a>
  </nav>

  <div class="container">
    <div class="error-number">404</div>
    <div class="error-content">
      <p class="error-tag">Error 404</p>
      <h1 class="error-title">This page took<br>a <em>wrong turn</em></h1>
      <p class="error-desc">Looks like the page you're looking for doesn't exist — or maybe it moved. Either way, there's better stuff back on the portfolio.</p>
      <div class="error-actions">
        <a href="index.html" class="btn-primary">Back to Portfolio →</a>
        <a href="index.html#projects" class="btn-secondary">View Work</a>
      </div>
    </div>
  </div>

  <footer>
    <span class="footer-copy">© 2026 Meet Shah. All rights reserved.</span>
    <span class="footer-copy">Dublin, Ireland</span>
  </footer>

</body>
</html>
